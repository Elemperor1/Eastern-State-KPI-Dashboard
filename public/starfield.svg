<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="640" height="640">
  <!--
    Eastern State KPI — login panel decorative texture.
    A subtle teal pinprick overlay on the dark navy ({colors.tertiary}) panel
    used by /login and /login/loading. Each star is a tiny teal circle at
    low opacity so the texture is felt rather than seen — atmospheric depth
    on the dark side of the split-screen login layout.

    Replaces the older Sentry-flavored "starfield" with a teal/navy variant
    that matches the current brand palette. The base background of the panel
    is the parent's bg-ink-900 class (which is {colors.tertiary} = #003649);
    this texture sits on top of that, not instead of it.
  -->
  <g fill="#209ba5" opacity="0.08">
    <circle cx="32" cy="48" r="0.8"/>
    <circle cx="120" cy="92" r="0.6"/>
