app = "eastern-state-kpi-dashboard"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  AUTH_DISABLED = "false"
  DATABASE_PATH = "/app/data/kpi.db"
  NODE_ENV = "production"
  PORT = "3000"
  SESSION_SECURE = "true"
  TRUST_PROXY = "true"

[[mounts]]
  source = "kpi_data"
  destination = "/app/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
