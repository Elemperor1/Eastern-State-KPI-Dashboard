app = "eastern-state-kpi-dashboard"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  AUTH_DISABLED = "false"
  DATABASE_PATH = "/app/data/kpi.db"
  NODE_ENV = "production"
  PORT = "3000"
  # D8AD-CAN-004 CSRF hardening: the canonical origin the request guard
  # accepts on state-changing requests. Explicit literal so the allowed
  # origin set is not derived from forwarded headers. See
  # docs/csrf-hardening.md.
  APP_CANONICAL_ORIGIN = "https://eastern-state-kpi-dashboard.fly.dev"
  SESSION_SECURE = "true"
  TRUST_PROXY = "true"

[[mounts]]
  source = "kpi_data"
  destination = "/app/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    # Fail closed on a missing, incompatible, locked, or incompletely migrated
    # SQLite volume. See docs/production-observability.md.
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/api/health/ready"
    protocol = "http"
    timeout = "2s"

    [http_service.checks.headers]
      X-Forwarded-Proto = "https"
